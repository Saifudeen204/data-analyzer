<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataFlow - Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>💰 DataFlow</h1>
    <p class="subtitle">Personal Expense Tracker</p>

    <div class="balance-box">
      <p>Current Balance</p>
      <h2 id="balance">₦0.00</h2>
    </div>

    <div class="summary">
      <div class="income">
        <p>Income</p>
        <h3 id="total-income">₦0.00</h3>
      </div>
      <div class="expense">
        <p>Expenses</p>
        <h3 id="total-expense">₦0.00</h3>
      </div>
    </div>

    <div class="form">
      <input type="text" id="desc" placeholder="Description (e.g. Salary, Food)" />
      <input type="number" id="amount" placeholder="Amount (e.g. 5000)" />
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <button onclick="addTransaction()">Add Transaction</button>
    </div>

    <h3 class="history-title">Transaction History</h3>
    <ul id="transaction-list"></ul>
  </div>
  <script src="script.js"></script>
</body>
      </html>
